<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Action Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f4f7f7;
    --surface:#ffffff;
    --surface2:#eef4f4;
    --border:#d0e4e4;
    --border-hover:#9cc4c4;
    --text:#0f2626;
    --text-secondary:#4a7070;
    --text-hint:#90b0b0;
    --accent:#0d6e6e;
    --accent-hover:#0a5858;
    --accent-light:#e0f2f2;
    --radius:8px;
    --radius-lg:14px;
    --radius-xl:18px;
    --shadow:0 2px 10px rgba(13,110,110,.07);
    --shadow-md:0 4px 20px rgba(13,110,110,.12);
  }
  body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
  .app{max-width:1280px;margin:0 auto;padding:28px 24px}

  .app-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:8px}
  h1{font-size:20px;font-weight:700;letter-spacing:-.3px;color:var(--text)}
  .subtitle{font-size:12px;color:var(--text-hint);margin-top:3px}

  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:20px 0}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;box-shadow:var(--shadow);transition:all .18s;cursor:pointer}
  .kpi:hover{box-shadow:var(--shadow-md);border-color:var(--border-hover);transform:translateY(-1px)}
  .kpi.active-filter{border-color:var(--accent);background:var(--accent-light);box-shadow:0 0 0 2px rgba(13,110,110,.15)}
  .kpi-label{font-size:10px;color:var(--text-secondary);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
  .kpi-val{font-size:28px;font-weight:700;line-height:1}
  .kpi-val.danger{color:#c0392b}
  .kpi-val.warning{color:#d97706}
  .kpi-val.info{color:#1a6fa0}
  .kpi-val.success{color:#1e7a4e}
  .kpi-val.neutral{color:var(--text)}

  .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
  .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow)}
  .chart-title{font-size:10px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;text-align:center}
  .chart-wrap{position:relative;height:200px}

  .tab-bar{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding:4px 2px;flex-wrap:nowrap}
  .tab-btn{font-size:13px;font-weight:500;padding:7px 16px;border:1px solid var(--border);background:var(--surface);color:var(--text-secondary);cursor:pointer;border-radius:99px;white-space:nowrap;transition:all .18s}
  .tab-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
  .tab-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;box-shadow:0 2px 8px rgba(13,110,110,.25)}

  .toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
  .toolbar input[type=text]{flex:1;min-width:160px;height:36px;border:1px solid var(--border);border-radius:var(--radius);padding:0 12px;font-size:13px;background:var(--surface);color:var(--text);outline:none;font-family:inherit;transition:border-color .2s}
  .toolbar input[type=text]:focus{border-color:var(--accent)}
  .toolbar select{height:36px;border:1px solid var(--border);border-radius:var(--radius);padding:0 10px;font-size:13px;background:var(--surface);color:var(--text);outline:none;cursor:pointer;font-family:inherit;transition:border-color .2s}
  .toolbar select:focus{border-color:var(--accent)}
  .btn-add{height:36px;padding:0 18px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .18s;font-family:inherit;box-shadow:0 2px 8px rgba(13,110,110,.2)}
  .btn-add:hover{background:var(--accent-hover)}
  .btn-export{height:36px;padding:0 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);font-size:13px;color:var(--text-secondary);cursor:pointer;white-space:nowrap;font-family:inherit;font-weight:500;transition:all .18s}
  .btn-export:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}

  .tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);overflow:hidden;box-shadow:var(--shadow)}
  table{width:100%;border-collapse:collapse;min-width:700px}
  th{font-size:10px;font-weight:700;color:var(--text-secondary);padding:11px 14px;text-align:left;border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap;text-transform:uppercase;letter-spacing:.06em}
  td{font-size:13px;padding:11px 14px;border-bottom:1px solid #eef4f4;color:var(--text);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#f4fafa}
  .empty-row td{text-align:center;padding:40px;color:var(--text-hint)}

  .badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:6px;white-space:nowrap}
  .b-blue{background:#deeaf8;color:#1a4fa0}
  .b-green{background:#daf0e6;color:#1a6b3e}
  .b-amber{background:#fef0d8;color:#a06010}
  .b-red{background:#fde8e8;color:#a02020}
  .b-red-dark{background:#c0392b;color:#fff}
  .b-purple{background:#ebe8fc;color:#4a2fa0}
  .b-teal{background:#d8f0ee;color:#0d6e6e}
  .b-pink{background:#fce8f3;color:#8a1a5c}
  .b-gray{background:#eef2f2;color:#4a7070}

  th.sortable{cursor:pointer;user-select:none}
  th.sortable:hover{color:var(--accent)}
  th.sortable .sort-icon{margin-left:4px;opacity:.35;font-size:10px}
  th.sortable.asc .sort-icon::after{content:'▲';opacity:1;color:var(--accent)}
  th.sortable.desc .sort-icon::after{content:'▼';opacity:1;color:var(--accent)}
  th.sortable:not(.asc):not(.desc) .sort-icon::after{content:'⇅'}

  .btn-icon{background:var(--surface2);border:1px solid var(--border);border-radius:6px;cursor:pointer;color:var(--text-secondary);padding:4px 8px;font-size:13px;transition:all .18s;margin-right:3px}
  .btn-icon:hover{background:var(--accent-light);color:var(--accent);border-color:var(--border-hover)}
  .btn-del:hover{background:#fde8e8;color:#c0392b;border-color:#f0a0a0}

  .overlay{display:none;position:fixed;inset:0;background:rgba(15,38,38,.4);z-index:100;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)}
  .overlay.open{display:flex}
  .modal{background:var(--surface);border-radius:var(--radius-xl);padding:28px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(13,110,110,.18)}
  .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
  .modal-header h2{font-size:16px;font-weight:700}
  .btn-close{background:var(--surface2);border:1px solid var(--border);cursor:pointer;color:var(--text-secondary);font-size:16px;padding:4px 8px;border-radius:6px;transition:all .18s}
  .btn-close:hover{background:var(--accent-light);color:var(--accent)}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .form-grid .full{grid-column:1/-1}
  .field{display:flex;flex-direction:column;gap:4px}
  .field label{font-size:10px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em}
  .field input,.field select,.field textarea{height:36px;border:1px solid var(--border);border-radius:var(--radius);padding:0 12px;font-size:13px;background:var(--bg);color:var(--text);outline:none;font-family:inherit;transition:border-color .2s}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);background:var(--surface)}
  .field textarea{height:76px;resize:vertical;padding:10px 12px}
  .modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
  .btn-cancel{height:36px;padding:0 16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);font-size:13px;cursor:pointer;color:var(--text-secondary);font-family:inherit;font-weight:500;transition:all .18s}
  .btn-cancel:hover{border-color:var(--border-hover)}
  .btn-save{height:36px;padding:0 22px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .18s;box-shadow:0 2px 8px rgba(13,110,110,.2)}
  .btn-save:hover{background:var(--accent-hover)}

  .toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:11px 18px;border-radius:var(--radius);font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;box-shadow:var(--shadow-md)}
  .toast.show{opacity:1}

  .title-cell{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}
  .tag-cell{max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .notes-cell{max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-hint);font-size:12px}

  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--border-hover);border-radius:99px}

  @media(max-width:640px){
    .form-grid{grid-template-columns:1fr}
    .form-grid .full{grid-column:1}
    .kpi-grid{grid-template-columns:repeat(2,1fr)}
    .charts-row{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="app">
  <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:4px">
    <div>
      <h1>Action Tracker</h1>
      <div class="subtitle" id="last-saved">Memuat data...</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-export" onclick="exportCSV()">&#x2913; Export CSV</button>
      <button class="btn-add" onclick="openForm()">+ Tambah</button>
    </div>
  </div>

  <div class="kpi-grid" id="kpi-grid">
    <div class="kpi" id="kpi-aktif" onclick="kpiFilter('aktif')"><div class="kpi-label">Total aktif</div><div class="kpi-val" id="k-aktif">—</div></div>
    <div class="kpi" id="kpi-week" onclick="kpiFilter('week')"><div class="kpi-label">Deadline minggu ini</div><div class="kpi-val warning" id="k-week">—</div></div>
    <div class="kpi" id="kpi-over" onclick="kpiFilter('over')"><div class="kpi-label">Overdue</div><div class="kpi-val danger" id="k-over">—</div></div>
    <div class="kpi" id="kpi-wait" onclick="kpiFilter('wait')"><div class="kpi-label">Menunggu respons</div><div class="kpi-val info" id="k-wait">—</div></div>
    <div class="kpi" id="kpi-done" onclick="kpiFilter('done')"><div class="kpi-label">Selesai</div><div class="kpi-val success" id="k-done">—</div></div>
  </div>

  <div class="charts-row" id="charts-row">
    <div class="chart-card">
      <div class="chart-title">Distribusi per Dept</div>
      <div class="chart-wrap"><canvas id="chart-dept"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Distribusi per Status</div>
      <div class="chart-wrap"><canvas id="chart-status"></canvas></div>
    </div>
  </div>

  <div class="tab-bar" id="tab-bar"></div>

  <div class="toolbar">
    <input type="text" id="search" placeholder="&#x1F50D; Cari task..." oninput="renderTable()">
    <select id="f-status" onchange="renderTable()">
      <option value="">Semua status</option>
      <option>To Do</option>
      <option>In Progress</option>
      <option>Done</option>
      <option>Menunggu</option>
    </select>
    <select id="f-priority" onchange="renderTable()">
      <option value="">Semua prioritas</option>
      <option>High</option>
      <option>Medium</option>
      <option>Low</option>
    </select>
    <select id="f-dl" onchange="renderTable()">
      <option value="">Semua deadline</option>
      <option value="overdue">Overdue</option>
      <option value="today">Hari ini</option>
      <option value="week">Minggu ini</option>
    </select>
    <select id="f-dept" onchange="renderTable()">
      <option value="">Semua dept</option>
      <option>Transport Operation</option>
      <option>Transport HUB</option>
      <option>Transport Support</option>
      <option>Transport Service</option>
    </select>
  </div>

  <div class="tbl-wrap">
    <table>
      <thead id="thead"><tr><th>Memuat...</th></tr></thead>
      <tbody id="tbody"><tr class="empty-row"><td>Memuat data...</td></tr></tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Tambah task</h2>
      <button class="btn-close" onclick="closeForm()">&#x2715;</button>
    </div>
    <div id="form-body"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeForm()">Batal</button>
      <button class="btn-save" onclick="saveRecord()">Simpan</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

  meetings:['Nama Meeting','Tgl Meeting','Peserta','Follow-up','PIC','Deadline','Status','Notes','Aksi'],
  projects:['Nama Project','Fase','Deskripsi','R','A','C','I','Deadline','Status','Prioritas','Notes','Aksi'],

let activeTab = 'semua';
let allData = {};
let editId = null;
let editTable = null;
let sortKey = null;
let sortDir = 1; // 1=asc, -1=desc

function setSort(key){
  if(sortKey===key){ sortDir*=-1; }
  else { sortKey=key; sortDir=1; }
  renderTable();
}

function applySorting(rows, table){
  if(!sortKey) return rows;
  return [...rows].sort((a,b)=>{
    let av='', bv='';
    if(sortKey==='title'){ av=getTitle(table,a); bv=getTitle(table,b); }
    else if(sortKey==='status'){ av=getStatus(table,a)||''; bv=getStatus(table,b)||''; }
    else if(sortKey==='deadline'){ av=getDeadline(table,a)||''; bv=getDeadline(table,b)||''; }
    else if(sortKey==='dept'){ av=a.dept||a.dept_owner||''; bv=b.dept||b.dept_owner||''; }
    else if(sortKey==='prioritas'){ 
      const o={High:0,Medium:1,Low:2};
      av=o[a.prioritas]??9; bv=o[b.prioritas]??9;
      return (av-bv)*sortDir;
    }
    else { av=a[sortKey]||''; bv=b[sortKey]||''; }
    return av.localeCompare(bv)*sortDir;
  });
}

function sortClass(key){ return sortKey===key?(sortDir===1?'sortable asc':'sortable desc'):'sortable'; }

function kpiFilter(type){
  const cards = ['aktif','week','over','wait','done'];
  // Toggle off if already active
  const card = document.getElementById('kpi-'+type);
  const isActive = card.classList.contains('active-filter');
  
  // Remove all active states
  cards.forEach(c => document.getElementById('kpi-'+c).classList.remove('active-filter'));
  
  // Reset filters
  document.getElementById('f-status').value = '';
  document.getElementById('f-dl').value = '';
  
  if(!isActive){
    card.classList.add('active-filter');
    if(type==='aktif'){
      // show all non-done — reset filters
    } else if(type==='week'){
      document.getElementById('f-dl').value = 'week';
    } else if(type==='over'){
      document.getElementById('f-dl').value = 'overdue';
    } else if(type==='wait'){
      document.getElementById('f-status').value = 'Menunggu';
    } else if(type==='done'){
      document.getElementById('f-status').value = 'Done';
    }
  }
  renderTable();
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function deadlineBadge(dl){
  if(!dl) return '<span style="color:#ccc">—</span>';
  const today=new Date();today.setHours(0,0,0,0);
  const d=new Date(dl);d.setHours(0,0,0,0);
  const diff=Math.round((d-today)/(86400000));
  if(diff<0) return `<span class="badge b-red-dark">Overdue ${Math.abs(diff)}h</span>`;
  if(diff===0) return `<span class="badge b-red">Hari ini</span>`;
  if(diff<=3) return `<span class="badge b-amber">${diff} hari lagi</span>`;
  return `<span class="badge b-gray">${d.toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'})}</span>`;
}

function statusBadge(s){
  if(!s) return '—';
  const map={'To Do':'b-gray','In Progress':'b-blue','Done':'b-green','Menunggu':'b-amber'};
  return `<span class="badge ${map[s]||'b-gray'}">${s}</span>`;
}

function prioBadge(p){
  if(!p) return '—';
  const map={High:'b-red',Medium:'b-amber',Low:'b-green'};
  return `<span class="badge ${map[p]||'b-gray'}">${p}</span>`;
}

function getTitle(table, row){
  return row.nama_meeting||row.nama_project||row.judul||row.topik||'—';
}

function getDeadline(table, row){
  return row.deadline||row.deadline_laporan||null;
}

function getStatus(table, row){
  return row.status||row.status_koordinasi||null;
}


let chartDept = null;
let chartStatus = null;

function renderCharts(){
  const all = getAllRows();
  
  // Dept chart
  const depts = ['Transport Operation','Transport HUB','Transport Support','Transport Service'];
  const deptCounts = depts.map(d => all.filter(r => (r.dept||r.dept_owner) === d).length);
  const deptColors = ['#1a4fa0','#0a5c42','#8a5a00','#8a1a5c'];
  
  const ctxDept = document.getElementById('chart-dept').getContext('2d');
  if(chartDept) chartDept.destroy();
  chartDept = new Chart(ctxDept, {
    type: 'pie',
    data: {
      labels: depts,
      datasets: [{data: deptCounts, backgroundColor: ['#d8f0ee','#deeaf8','#fef0d8','#ebe8fc'], borderColor: ['#0d6e6e','#1a4fa0','#a06010','#4a2fa0'], borderWidth: 2}]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: {position: 'bottom', labels: {font:{size:11}, padding:8, boxWidth:12}},
        tooltip: {callbacks:{label: ctx => ` ${ctx.label}: ${ctx.raw} task`}}
      }
    }
  });

  // Status chart
  const statuses = ['To Do','In Progress','Done','Menunggu'];
  const statCounts = statuses.map(s => all.filter(r => getStatus(r._table,r) === s).length);
  const statColors = ['#eef2f2','#deeaf8','#daf0e6','#fef0d8'];
  const statBorders = ['#4a7070','#1a4fa0','#1a6b3e','#a06010'];
  
  const ctxStat = document.getElementById('chart-status').getContext('2d');
  if(chartStatus) chartStatus.destroy();
  chartStatus = new Chart(ctxStat, {
    type: 'pie',
    data: {
      labels: statuses,
      datasets: [{data: statCounts, backgroundColor: statColors, borderColor: statBorders, borderWidth: 2}]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: {position: 'bottom', labels: {font:{size:11}, padding:8, boxWidth:12}},
        tooltip: {callbacks:{label: ctx => ` ${ctx.label}: ${ctx.raw} task`}}
      }
    }
  });
}

function exportCSV(){
  const tabObj = TABS.find(t => t.id === activeTab);
  let rows, filename, headers;
  
  if(activeTab === 'semua'){
    rows = getAllRows();
    filename = 'action-tracker-semua.csv';
    headers = ['Kategori','Judul','Dept','Status','Prioritas','Deadline','PIC','Notes'];
    const csvRows = [headers.join(',')];
    rows.forEach(r => {
      const catMap = {meetings:'Meeting',projects:'Project',tasks:'Task',koordinasi:'Koordinasi',delegasi:'Delegasi'};
      const dl = getDeadline(r._table, r);
      const pic = r.pic||r.pic_internal||r.didelegasikan_ke||r.pic_eksternal||'';
      const notes = r.notes||r.catatan_followup||'';
      csvRows.push([
        catMap[r._table], getTitle(r._table,r), r.dept||r.dept_owner||'',
        getStatus(r._table,r)||'', r.prioritas||'', dl||'', pic, notes
      ].map(v => `"${(v||'').replace(/"/g,'""')}"`).join(','));
    });
    downloadCSV(csvRows.join('\n'), filename);
    return;
  }

  const table = tabObj.table;
  const cols = COLUMNS[table] || [];
  rows = allData[table] || [];
  filename = `action-tracker-${table}.csv`;
  headers = cols.map(c => c.label);
  const csvRows = [headers.join(',')];
  rows.forEach(r => {
    csvRows.push(cols.map(c => `"${(r[c.key]||'').toString().replace(/"/g,'""')}"`).join(','));
  });
  downloadCSV(csvRows.join('\n'), filename);
}

function downloadCSV(content, filename){
  const blob = new Blob([content], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  toast('CSV berhasil diexport!');
}

async function loadAll(){
  document.getElementById('last-saved').textContent='Memuat data...';
  allData={};
  const tables=['meetings','projects','tasks','koordinasi','delegasi'];
  for(const t of tables){
    const {data,error}=await sb.from(t).select('*').order('created_at',{ascending:false});
    allData[t]=error?[]:data;
  }
  updateKPI();
  renderTabs();
  renderTable();
  renderCharts();
  document.getElementById('last-saved').textContent='Tersimpan · '+new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
}

function getAllRows(){
  return Object.entries(allData).flatMap(([t,rows])=>rows.map(r=>({...r,_table:t})));
}

function updateKPI(){
  const all=getAllRows();
  const today=new Date();today.setHours(0,0,0,0);
  const weekEnd=new Date(today);weekEnd.setDate(today.getDate()+7);
  const active=all.filter(r=>getStatus(r._table,r)!=='Done').length;
  const week=all.filter(r=>{const dl=getDeadline(r._table,r);if(!dl||getStatus(r._table,r)==='Done')return false;const d=new Date(dl);d.setHours(0,0,0,0);return d>=today&&d<=weekEnd;}).length;
  const over=all.filter(r=>{const dl=getDeadline(r._table,r);if(!dl||getStatus(r._table,r)==='Done')return false;const d=new Date(dl);d.setHours(0,0,0,0);return d<today;}).length;
  const wait=all.filter(r=>getStatus(r._table,r)==='Menunggu'||r.status_koordinasi==='Menunggu respons').length;
  const done=all.filter(r=>getStatus(r._table,r)==='Done').length;
  document.getElementById('k-aktif').textContent=active;
  document.getElementById('k-week').textContent=week;
  document.getElementById('k-over').textContent=over;
  document.getElementById('k-wait').textContent=wait;
  document.getElementById('k-done').textContent=done;
}

function renderTabs(){
  const counts={semua:getAllRows().length};
  ['meetings','projects','tasks','koordinasi','delegasi'].forEach(t=>counts[t]=(allData[t]||[]).length);
  document.getElementById('tab-bar').innerHTML=TABS.map(t=>
    `<button class="tab-btn${t.id===activeTab?' active':''}" onclick="setTab('${t.id}')">${t.label} <span style="font-size:11px;color:var(--text-hint)">${counts[t.id]||0}</span></button>`
  ).join('');
}

function setTab(id){activeTab=id;renderTabs();renderTable();}

function filterRows(rows, table){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const fs=document.getElementById('f-status').value;
  const fp=document.getElementById('f-priority').value;
  const fd=document.getElementById('f-dl').value;
  const fdept=document.getElementById('f-dept').value;
  const today=new Date();today.setHours(0,0,0,0);
  const weekEnd=new Date(today);weekEnd.setDate(today.getDate()+7);
  return rows.filter(r=>{
    const title=getTitle(table,r).toLowerCase();
    if(q&&!title.includes(q)) return false;
    if(fs&&getStatus(table,r)!==fs) return false;
    if(fp&&r.prioritas!==fp) return false;
    if(fdept&&r.dept!==fdept&&r.dept_owner!==fdept) return false;
    if(fd){
      const dl=getDeadline(table,r);
      if(!dl) return false;
      const d=new Date(dl);d.setHours(0,0,0,0);
      if(fd==='overdue'&&d>=today) return false;
      if(fd==='today'&&d.getTime()!==today.getTime()) return false;
      if(fd==='week'&&(d<today||d>weekEnd)) return false;
    }
    return true;
  });
}

function renderTable(){
  const thead=document.getElementById('thead');
  const tbody=document.getElementById('tbody');

  if(activeTab==='semua'){
    thead.innerHTML=`<tr>
    <th class="${sortClass('title')}" onclick="setSort('title')">Judul<span class="sort-icon"></span></th>
    <th>Kategori</th>
    <th class="${sortClass('dept')}" onclick="setSort('dept')">Dept<span class="sort-icon"></span></th>
    <th class="${sortClass('status')}" onclick="setSort('status')">Status<span class="sort-icon"></span></th>
    <th class="${sortClass('prioritas')}" onclick="setSort('prioritas')">Prioritas<span class="sort-icon"></span></th>
    <th class="${sortClass('deadline')}" onclick="setSort('deadline')">Deadline<span class="sort-icon"></span></th>
    <th>PIC</th><th>Notes</th><th>Aksi</th>
  </tr>`;
    let rows=getAllRows();
    rows=filterRows(rows,'_mixed');
    if(!rows.length){tbody.innerHTML='<tr class="empty-row"><td colspan="8">Belum ada data</td></tr>';return;}
    tbody.innerHTML=rows.map(r=>{
      const catMap={meetings:'Meeting',projects:'Project',tasks:'Task',koordinasi:'Koordinasi',delegasi:'Delegasi'};
      const catBadge={meetings:'b-blue',projects:'b-purple',tasks:'b-gray',koordinasi:'b-teal',delegasi:'b-pink'};
      const dl=getDeadline(r._table,r);
      const pic=r.pic||r.pic_internal||r.didelegasikan_ke||r.pic_eksternal||'—';
      const notes=r.notes||r.catatan_followup||r.keputusan||'';

        <td class="title-cell" title="${getTitle(r._table,r)}">${getTitle(r._table,r)}</td>
        <td><span class="badge ${catBadge[r._table]}">${catMap[r._table]}</span></td>
        <td style="font-size:12px;color:var(--text-secondary)">${r.dept||r.dept_owner||'—'}</td>

        <td>${r.prioritas?prioBadge(r.prioritas):'—'}</td>
        <td>${deadlineBadge(dl)}</td>
        <td style="font-size:12px;color:var(--text-secondary)">${pic}</td>
        <td class="notes-cell" title="${notes}">${notes||'—'}</td>
        <td><button class="btn-icon" onclick="editRecord('${r._table}','${r.id}')">&#x270E;</button><button class="btn-icon btn-del" onclick="deleteRecord('${r._table}','${r.id}')">&#x2715;</button></td>
      </tr>`;

  }

  const headers=TABLE_HEADERS[table]||[];

    'Nama Meeting':'title','Nama Project':'title','Judul Task':'title','Topik':'title',
    'Status':'status','Deadline':'deadline','Prioritas':'prioritas','Dept':'dept',

  };
  thead.innerHTML='<tr>'+headers.map(h=>{
    const sk=sortableKeys[h];
    if(sk) return `<th class="${sortClass(sk)}" onclick="setSort('${sk}')">${h}<span class="sort-icon"></span></th>`;
    return `<th>${h}</th>`;
  }).join('')+'</tr>';

  let rows=filterRows(allData[table]||[],table);
  rows=applySorting(rows,table);
  if(!rows.length){tbody.innerHTML=`<tr class="empty-row"><td colspan="${headers.length}">Belum ada data. Klik + Tambah untuk mulai.</td></tr>`;return;}

  tbody.innerHTML=rows.map(r=>{
    let cells='';
    const dl=getDeadline(table,r);

    if(table==='meetings'){
      cells=`
        <td class="title-cell" title="${r.nama_meeting||''}">${r.nama_meeting||'—'}</td>
        <td style="font-size:12px">${r.tanggal_meeting?new Date(r.tanggal_meeting).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}):'—'}</td>
        <td class="tag-cell" title="${r.peserta||''}" style="font-size:12px;color:var(--text-secondary)">${r.peserta||'—'}</td>
        <td class="notes-cell" title="${r.follow_up||''}">${r.follow_up||'—'}</td>
        <td style="font-size:12px;color:var(--text-secondary)">${r.pic||'—'}</td>
        <td>${deadlineBadge(dl)}</td>
        <td>${statusBadge(r.status)}</td>
        <td class="notes-cell" title="${r.notes||''}">${r.notes||'—'}</td>`;
    } else if(table==='projects'){
      cells=`
        <td class="title-cell" title="${r.nama_project||''}">${r.nama_project||'—'}</td>
        <td style="font-size:12px"><span class="badge b-gray">${r.fase||'—'}</span></td>
        <td class="notes-cell" title="${r.deskripsi||''}">${r.deskripsi||'—'}</td>
        <td style="font-size:12px;color:var(--text-secondary)">${r.responsible||'—'}</td>
        <td style="font-size:12px;color:var(--text-secondary)">${r.accountable||'—'}</td>
        <td class="tag-cell" style="font-size:12px;color:var(--text-secondary)" title="${r.consulted||''}">${r.consulted||'—'}</td>
        <td class="tag-cell" style="font-size:12px;color:var(--text-secondary)" title="${r.informed||''}">${r.informed||'—'}</td>
        <td>${deadlineBadge(dl)}</td>
        <td>${statusBadge(r.status)}</td>
        <td>${prioBadge(r.prioritas)}</td>

    } else if(table==='tasks'){
      cells=`
        <td class="title-cell" title="${r.judul||''}">${r.judul||'—'}</td>
        <td class="notes-cell" title="${r.deskripsi||''}">${r.deskripsi||'—'}</td>

        <td>${deadlineBadge(dl)}</td>
        <td>${prioBadge(r.prioritas)}</td>
        <td>${statusBadge(r.status)}</td>
        <td class="notes-cell" title="${r.notes||''}">${r.notes||'—'}</td>`;

      const skMap={'Menunggu respons':'b-amber','Sudah dikonfirmasi':'b-green','Ditolak':'b-red'};

        <td class="notes-cell" title="${r.notes||''}">${r.notes||'—'}</td>`;
    } else if(table==='delegasi'){
      cells=`
        <td class="title-cell" title="${r.judul||''}">${r.judul||'—'}</td>
        <td style="font-size:12px;color:var(--text-secondary)">${r.didelegasikan_ke||'—'}</td>
        <td style="font-size:12px"><span class="badge b-pink">${r.dept||'—'}</span></td>
        <td>${deadlineBadge(r.deadline_laporan)}</td>
        <td>${statusBadge(r.status)}</td>
        <td class="notes-cell" title="${r.catatan_followup||''}">${r.catatan_followup||'—'}</td>`;
    }

    return `<tr>${cells}<td><button class="btn-icon" onclick="editRecord('${table}','${r.id}')">&#x270E;</button><button class="btn-icon btn-del" onclick="deleteRecord('${table}','${r.id}')">&#x2715;</button></td></tr>`;
  }).join('');
}

function buildForm(table, data){
  const cols=COLUMNS[table]||[];
  const half=[];const full=[];
  cols.forEach(c=>{
    if(c.type==='textarea') full.push(c);
    else half.push(c);
  });
  const renderField=c=>{
    const val=data?.(c.key)||'';
    let input='';
    if(c.type==='select'){
      input=`<select id="ff-${c.key}">${(c.opts||[]).map(o=>`<option${val===o?' selected':''}>${o}</option>`).join('')}</select>`;
    } else if(c.type==='textarea'){
      input=`<textarea id="ff-${c.key}" placeholder="${c.label}...">${val}</textarea>`;
    } else if(c.type==='date'){
      input=`<input type="date" id="ff-${c.key}" value="${val}">`;
    } else {
      input=`<input type="text" id="ff-${c.key}" placeholder="${c.label}..." value="${val}">`;
    }
    return `<div class="field ${c.type==='textarea'?'full':''}"><label>${c.label}${c.required?' *':''}</label>${input}</div>`;
  };

  return `<div class="form-grid">${cols.map(renderField).join('')}</div>`;
}

function openForm(){
  editId=null;
  editTable=(activeTab==='semua'?'tasks':TABS.find(t=>t.id===activeTab)?.table)||'tasks';
  document.getElementById('modal-title').textContent='Tambah item';
  let formHtml='';
  if(activeTab==='semua'){
    formHtml=`<div class="field full" style="margin-bottom:12px"><label>Kategori *</label><select id="ff-_table" onchange="switchFormTab(this.value)"><option value="tasks">Task</option><option value="meetings">Meeting</option><option value="projects">Project</option><option value="koordinasi">Koordinasi</option><option value="delegasi">Delegasi</option></select></div><div id="form-fields">${buildForm('tasks',null)}</div>`;
  } else {
    formHtml=`<div id="form-fields">${buildForm(editTable,null)}</div>`;
  }
  document.getElementById('form-body').innerHTML=formHtml;
  document.getElementById('overlay').classList.add('open');
}

function switchFormTab(t){
  editTable=t;
  document.getElementById('form-fields').innerHTML=buildForm(t,null);
}

function closeForm(){document.getElementById('overlay').classList.remove('open');editId=null;editTable=null;}

async function saveRecord(){
  if(activeTab==='semua'&&!editId){
    const sel=document.getElementById('ff-_table');
    if(sel) editTable=sel.value;
  }
  const table=editTable||'tasks';
  const cols=COLUMNS[table]||[];
  const payload={};
  for(const c of cols){
    const el=document.getElementById('ff-'+c.key);
    if(el) payload[c.key]=el.value||null;
    if(c.required&&(!el||!el.value.trim())){toast('Lengkapi field wajib!');return;}
  }
  let err;
  if(editId){
    const res=await sb.from(table).update(payload).eq('id',editId);
    err=res.error;
  } else {
    const res=await sb.from(table).insert(payload);
    err=res.error;
  }
  if(err){toast('Gagal simpan: '+err.message);return;}
  toast(editId?'Berhasil diupdate!':'Berhasil ditambahkan!');
  closeForm();
  await loadAll();
}

async function editRecord(table, id){
  const row=(allData[table]||[]).find(r=>r.id===id);
  if(!row){toast('Data tidak ditemukan');return;}
  editId=id;
  editTable=table;
  document.getElementById('modal-title').textContent='Edit item';
  // Show kategori selector if in semua tab
  let formHtml='';
  if(activeTab==='semua'){
    const catVal=table;
    formHtml=`<div class="field full" style="margin-bottom:12px"><label>Kategori *</label><select id="ff-_table" disabled><option value="${catVal}">${{meetings:'Meeting',projects:'Project',tasks:'Task',koordinasi:'Koordinasi',delegasi:'Delegasi'}[catVal]}</option></select></div><div id="form-fields">${buildForm(table,k=>row[k])}</div>`;
  } else {
    formHtml=`<div id="form-fields">${buildForm(table,k=>row[k])}</div>`;
  }
  document.getElementById('form-body').innerHTML=formHtml;
  document.getElementById('overlay').classList.add('open');
}

async function deleteRecord(table, id){
  if(!confirm('Hapus item ini?')) return;
  const {error}=await sb.from(table).delete().eq('id',id);
  if(error){toast('Gagal hapus!');return;}
  toast('Item dihapus.');
  await loadAll();
}

document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeForm();});

loadAll();
</script>
