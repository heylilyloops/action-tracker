<!DOCTYPE html>
<html lang="id">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f8f8f7;
    --surface:#ffffff;
    --border:#e5e5e3;
    --border-hover:#c8c8c5;
    --text:#1a1a18;
    --text-secondary:#6b6b68;
    --text-hint:#a0a09d;
    --radius:8px;
    --radius-lg:12px;
    --blue-bg:#e8f0fb;--blue-text:#1a4fa0;
    --green-bg:#e6f4e6;--green-text:#1e6b2e;
    --amber-bg:#fef3d8;--amber-text:#8a5a00;
    --red-bg:#fdecea;--red-text:#9b1c1c;
    --red-dark-bg:#d32f2f;--red-dark-text:#fff;
    --purple-bg:#ede8fc;--purple-text:#4a2fa0;
    --teal-bg:#e0f5ee;--teal-text:#0a5c42;
    --pink-bg:#fce8f3;--pink-text:#8a1a5c;
    --gray-bg:#f0efed;--gray-text:#44443f;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
  .app{max-width:1200px;margin:0 auto;padding:24px 20px}
  h1{font-size:20px;font-weight:600;letter-spacing:-.3px}
  .subtitle{font-size:13px;color:var(--text-secondary);margin-top:2px}

  /* KPI */
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin:20px 0}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px}
  .kpi-label{font-size:11px;color:var(--text-secondary);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
  .kpi-val{font-size:26px;font-weight:600;line-height:1}
  .kpi-val.danger{color:#c0392b}
  .kpi-val.warning{color:#d97706}
  .kpi-val.info{color:#1a4fa0}
  .kpi-val.success{color:#1e6b2e}

  /* Tabs */
  .tab-bar{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:16px;overflow-x:auto;padding-bottom:0}
  .tab-btn{font-size:13px;font-weight:500;padding:8px 16px;border:none;background:transparent;color:var(--text-secondary);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:color .15s}
  .tab-btn:hover{color:var(--text)}
  .tab-btn.active{color:var(--text);border-bottom-color:var(--text)}

  /* Toolbar */
  .toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
  .toolbar input[type=text]{flex:1;min-width:160px;height:34px;border:1px solid var(--border);border-radius:var(--radius);padding:0 10px;font-size:13px;background:var(--surface);color:var(--text);outline:none}
  .toolbar input[type=text]:focus{border-color:var(--border-hover)}
  .toolbar select{height:34px;border:1px solid var(--border);border-radius:var(--radius);padding:0 8px;font-size:13px;background:var(--surface);color:var(--text);outline:none;cursor:pointer}
  .btn-add{height:34px;padding:0 16px;background:var(--text);color:#fff;border:none;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:opacity .15s}
  .btn-add:hover{opacity:.85}

  /* Table */
  .tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow-x:auto}
  table{width:100%;border-collapse:collapse;min-width:700px}
  th{font-size:11px;font-weight:600;color:var(--text-secondary);padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);background:#fafaf9;white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
  td{font-size:13px;padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#fafaf9}
  .empty-row td{text-align:center;padding:32px;color:var(--text-hint)}

  /* Badges */
  .badge{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:99px;white-space:nowrap}
  .b-blue{background:var(--blue-bg);color:var(--blue-text)}
  .b-green{background:var(--green-bg);color:var(--green-text)}
  .b-amber{background:var(--amber-bg);color:var(--amber-text)}
  .b-red{background:var(--red-bg);color:var(--red-text)}
  .b-red-dark{background:var(--red-dark-bg);color:var(--red-dark-text)}
  .b-purple{background:var(--purple-bg);color:var(--purple-text)}
  .b-teal{background:var(--teal-bg);color:var(--teal-text)}
  .b-pink{background:var(--pink-bg);color:var(--pink-text)}
  .b-gray{background:var(--gray-bg);color:var(--gray-text)}

  /* Action buttons */
  .btn-icon{background:transparent;border:1px solid var(--border);border-radius:6px;cursor:pointer;color:var(--text-secondary);padding:4px 7px;font-size:13px;transition:all .15s;margin-right:3px}
  .btn-icon:hover{background:var(--bg);color:var(--text);border-color:var(--border-hover)}
  .btn-del:hover{color:#c0392b;border-color:#fca5a5}

  /* Modal */
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;padding:20px}
  .overlay.open{display:flex}
  .modal{background:var(--surface);border-radius:var(--radius-lg);padding:24px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.12)}
  .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
  .modal-header h2{font-size:16px;font-weight:600}
  .btn-close{background:transparent;border:none;cursor:pointer;color:var(--text-secondary);font-size:18px;padding:2px 6px;border-radius:4px}
  .btn-close:hover{background:var(--bg);color:var(--text)}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .form-grid .full{grid-column:1/-1}
  .field{display:flex;flex-direction:column;gap:4px}
  .field label{font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em}
  .field input,.field select,.field textarea{height:36px;border:1px solid var(--border);border-radius:var(--radius);padding:0 10px;font-size:13px;background:var(--bg);color:var(--text);outline:none;font-family:inherit}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--border-hover);background:var(--surface)}
  .field textarea{height:72px;resize:vertical;padding:8px 10px}
  .modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
  .btn-cancel{height:36px;padding:0 16px;background:transparent;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;cursor:pointer;color:var(--text-secondary)}
  .btn-cancel:hover{background:var(--bg)}
  .btn-save{height:36px;padding:0 20px;background:var(--text);color:#fff;border:none;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer}
  .btn-save:hover{opacity:.85}

  /* Toast */
  .toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:10px 18px;border-radius:var(--radius);font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none}
  .toast.show{opacity:1}

  /* Loading */
  .loading{text-align:center;padding:40px;color:var(--text-hint);font-size:13px}

  /* Status dot */
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
  .dot-todo{background:#a0a09d}
  .dot-prog{background:#1a4fa0}
  .dot-done{background:#1e6b2e}
  .dot-wait{background:#d97706}

  .tag-cell{max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .notes-cell{max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-hint);font-size:12px}
  .title-cell{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}

  .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
  .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px}
  .chart-title{font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px;text-align:center}
  .chart-wrap{position:relative;height:200px}
  .btn-export{height:34px;padding:0 14px;background:transparent;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;color:var(--text-secondary);cursor:pointer;white-space:nowrap}
  .btn-export:hover{background:var(--bg);border-color:var(--border-hover);color:var(--text)}
  @media(max-width:640px){.charts-row{grid-template-columns:1fr}}
  @media(max-width:640px){
    .form-grid{grid-template-columns:1fr}
    .form-grid .full{grid-column:1}
    .kpi-grid{grid-template-columns:repeat(2,1fr)}
  }
</style>
</head>

      <option>Transport Operation</option>
      <option>Transport HUB</option>
      <option>Transport Support</option>
      <option>Transport Service</option>
    </select>
  </div>

  <div class="tbl-wrap">
    <table>
      <thead id="thead"><tr><th>Memuat...</th></tr></thead>
      <tbody id="tbody"><tr class="empty-row"><td>Memuat data...</td></tr></tbody>
    </table>
  </div>
</div>

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function deadlineBadge(dl){
  if(!dl) return '<span style="color:#ccc">—</span>';
  const today=new Date();today.setHours(0,0,0,0);
  const d=new Date(dl);d.setHours(0,0,0,0);
  const diff=Math.round((d-today)/(86400000));
  if(diff<0) return `<span class="badge b-red-dark">Overdue ${Math.abs(diff)}h</span>`;
  if(diff===0) return `<span class="badge b-red">Hari ini</span>`;
  if(diff<=3) return `<span class="badge b-amber">${diff} hari lagi</span>`;
  return `<span class="badge b-gray">${d.toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'})}</span>`;
}

function statusBadge(s){
  if(!s) return '—';
  const map={'To Do':'b-gray','In Progress':'b-blue','Done':'b-green','Menunggu':'b-amber'};
  return `<span class="badge ${map[s]||'b-gray'}">${s}</span>`;
}

function prioBadge(p){
  if(!p) return '—';
  const map={High:'b-red',Medium:'b-amber',Low:'b-green'};
  return `<span class="badge ${map[p]||'b-gray'}">${p}</span>`;
}

function getTitle(table, row){
  return row.nama_meeting||row.nama_project||row.judul||row.topik||'—';
}

function getDeadline(table, row){
  return row.deadline||row.deadline_laporan||null;
}

function getStatus(table, row){
  return row.status||row.status_koordinasi||null;
}


let chartDept = null;
let chartStatus = null;

function renderCharts(){
  const all = getAllRows();
  
  // Dept chart
  const depts = ['Transport Operation','Transport HUB','Transport Support','Transport Service'];
  const deptCounts = depts.map(d => all.filter(r => (r.dept||r.dept_owner) === d).length);
  const deptColors = ['#1a4fa0','#0a5c42','#8a5a00','#8a1a5c'];
  
  const ctxDept = document.getElementById('chart-dept').getContext('2d');
  if(chartDept) chartDept.destroy();
  chartDept = new Chart(ctxDept, {
    type: 'pie',
    data: {
      labels: depts,
      datasets: [{data: deptCounts, backgroundColor: ['#e8f0fb','#e0f5ee','#fef3d8','#fce8f3'], borderColor: deptColors, borderWidth: 2}]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: {position: 'bottom', labels: {font:{size:11}, padding:8, boxWidth:12}},
        tooltip: {callbacks:{label: ctx => ` ${ctx.label}: ${ctx.raw} task`}}
      }
    }
  });

  // Status chart
  const statuses = ['To Do','In Progress','Done','Menunggu'];
  const statCounts = statuses.map(s => all.filter(r => getStatus(r._table,r) === s).length);
  const statColors = ['#f0efed','#e8f0fb','#e6f4e6','#fef3d8'];
  const statBorders = ['#a0a09d','#1a4fa0','#1e6b2e','#d97706'];
  
  const ctxStat = document.getElementById('chart-status').getContext('2d');
  if(chartStatus) chartStatus.destroy();
  chartStatus = new Chart(ctxStat, {
    type: 'pie',
    data: {
      labels: statuses,
      datasets: [{data: statCounts, backgroundColor: statColors, borderColor: statBorders, borderWidth: 2}]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: {position: 'bottom', labels: {font:{size:11}, padding:8, boxWidth:12}},
        tooltip: {callbacks:{label: ctx => ` ${ctx.label}: ${ctx.raw} task`}}
      }
    }
  });
}

function exportCSV(){
  const tabObj = TABS.find(t => t.id === activeTab);
  let rows, filename, headers;
  
  if(activeTab === 'semua'){
    rows = getAllRows();
    filename = 'action-tracker-semua.csv';
    headers = ['Kategori','Judul','Dept','Status','Prioritas','Deadline','PIC','Notes'];
    const csvRows = [headers.join(',')];
    rows.forEach(r => {
      const catMap = {meetings:'Meeting',projects:'Project',tasks:'Task',koordinasi:'Koordinasi',delegasi:'Delegasi'};
      const dl = getDeadline(r._table, r);
      const pic = r.pic||r.pic_internal||r.didelegasikan_ke||r.pic_eksternal||'';
      const notes = r.notes||r.catatan_followup||'';
      csvRows.push([
        catMap[r._table], getTitle(r._table,r), r.dept||r.dept_owner||'',
        getStatus(r._table,r)||'', r.prioritas||'', dl||'', pic, notes
      ].map(v => `"${(v||'').replace(/"/g,'""')}"`).join(','));
    });
    downloadCSV(csvRows.join('\n'), filename);
    return;
  }

  const table = tabObj.table;
  const cols = COLUMNS[table] || [];
  rows = allData[table] || [];
  filename = `action-tracker-${table}.csv`;
  headers = cols.map(c => c.label);
  const csvRows = [headers.join(',')];
  rows.forEach(r => {
    csvRows.push(cols.map(c => `"${(r[c.key]||'').toString().replace(/"/g,'""')}"`).join(','));
  });
  downloadCSV(csvRows.join('\n'), filename);
}

function downloadCSV(content, filename){
  const blob = new Blob([content], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  toast('CSV berhasil diexport!');
}

async function loadAll(){
  document.getElementById('last-saved').textContent='Memuat data...';
  allData={};
  const tables=['meetings','projects','tasks','koordinasi','delegasi'];
  for(const t of tables){
    const {data,error}=await sb.from(t).select('*').order('created_at',{ascending:false});
    allData[t]=error?[]:data;
  }
  updateKPI();
  renderTabs();
  renderTable();
  renderCharts();
  document.getElementById('last-saved').textContent='Tersimpan · '+new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
}

function getAllRows(){
  return Object.entries(allData).flatMap(([t,rows])=>rows.map(r=>({...r,_table:t})));
}

function updateKPI(){
  const all=getAllRows();
  const today=new Date();today.setHours(0,0,0,0);
  const weekEnd=new Date(today);weekEnd.setDate(today.getDate()+7);
  const active=all.filter(r=>getStatus(r._table,r)!=='Done').length;
  const week=all.filter(r=>{const dl=getDeadline(r._table,r);if(!dl||getStatus(r._table,r)==='Done')return false;const d=new Date(dl);d.setHours(0,0,0,0);return d>=today&&d<=weekEnd;}).length;
  const over=all.filter(r=>{const dl=getDeadline(r._table,r);if(!dl||getStatus(r._table,r)==='Done')return false;const d=new Date(dl);d.setHours(0,0,0,0);return d<today;}).length;
  const wait=all.filter(r=>getStatus(r._table,r)==='Menunggu'||r.status_koordinasi==='Menunggu respons').length;
  const done=all.filter(r=>getStatus(r._table,r)==='Done').length;
  document.getElementById('k-aktif').textContent=active;
  document.getElementById('k-week').textContent=week;
  document.getElementById('k-over').textContent=over;
  document.getElementById('k-wait').textContent=wait;
  document.getElementById('k-done').textContent=done;
}

function renderTabs(){
  const counts={semua:getAllRows().length};
  ['meetings','projects','tasks','koordinasi','delegasi'].forEach(t=>counts[t]=(allData[t]||[]).length);
  document.getElementById('tab-bar').innerHTML=TABS.map(t=>
    `<button class="tab-btn${t.id===activeTab?' active':''}" onclick="setTab('${t.id}')">${t.label} <span style="font-size:11px;color:var(--text-hint)">${counts[t.id]||0}</span></button>`
  ).join('');
}

function setTab(id){activeTab=id;renderTabs();renderTable();}

function filterRows(rows, table){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const fs=document.getElementById('f-status').value;
  const fp=document.getElementById('f-priority').value;
  const fd=document.getElementById('f-dl').value;
  const fdept=document.getElementById('f-dept').value;
  const today=new Date();today.setHours(0,0,0,0);
  const weekEnd=new Date(today);weekEnd.setDate(today.getDate()+7);
  return rows.filter(r=>{
    const title=getTitle(table,r).toLowerCase();
    if(q&&!title.includes(q)) return false;
    if(fs&&getStatus(table,r)!==fs) return false;
    if(fp&&r.prioritas!==fp) return false;
    if(fdept&&r.dept!==fdept&&r.dept_owner!==fdept) return false;
    if(fd){
      const dl=getDeadline(table,r);
      if(!dl) return false;
      const d=new Date(dl);d.setHours(0,0,0,0);
      if(fd==='overdue'&&d>=today) return false;
      if(fd==='today'&&d.getTime()!==today.getTime()) return false;
      if(fd==='week'&&(d<today||d>weekEnd)) return false;
    }
    return true;
  });
}

function renderTable(){
  const thead=document.getElementById('thead');
  const tbody=document.getElementById('tbody');

  if(activeTab==='semua'){
    thead.innerHTML='<tr><th>Judul</th><th>Kategori</th><th>Dept</th><th>Status</th><th>Prioritas</th><th>Deadline</th><th>PIC</th><th>Notes</th><th>Aksi</th></tr>';
    let rows=getAllRows();
    rows=filterRows(rows,'_mixed');
    if(!rows.length){tbody.innerHTML='<tr class="empty-row"><td colspan="8">Belum ada data</td></tr>';return;}
    tbody.innerHTML=rows.map(r=>{
      const catMap={meetings:'Meeting',projects:'Project',tasks:'Task',koordinasi:'Koordinasi',delegasi:'Delegasi'};
      const catBadge={meetings:'b-blue',projects:'b-purple',tasks:'b-gray',koordinasi:'b-teal',delegasi:'b-pink'};
      const dl=getDeadline(r._table,r);
      const pic=r.pic||r.pic_internal||r.didelegasikan_ke||r.pic_eksternal||'—';
      const notes=r.notes||r.catatan_followup||r.keputusan||'';
      return `<tr>
        <td class="title-cell" title="${getTitle(r._table,r)}">${getTitle(r._table,r)}</td>
        <td><span class="badge ${catBadge[r._table]}">${catMap[r._table]}</span></td>
        <td style="font-size:12px;color:var(--text-secondary)">${r.dept||r.dept_owner||'—'}</td>
        <td>${statusBadge(getStatus(r._table,r))}</td>
        <td>${r.prioritas?prioBadge(r.prioritas):'—'}</td>
        <td>${deadlineBadge(dl)}</td>
        <td style="font-size:12px;color:var(--text-secondary)">${pic}</td>
        <td class="notes-cell" title="${notes}">${notes||'—'}</td>
        <td><button class="btn-icon" onclick="editRecord('${r._table}','${r.id}')">&#x270E;</button><button class="btn-icon btn-del" onclick="deleteRecord('${r._table}','${r.id}')">&#x2715;</button></td>
      </tr>`;
    }).join('');
    return;
  }

  const tabObj=TABS.find(t=>t.id===activeTab);
  const table=tabObj.table;
  const headers=TABLE_HEADERS[table]||[];
  thead.innerHTML='<tr>'+headers.map(h=>`<th>${h}</th>`).join('')+'</tr>';

  let rows=filterRows(allData[table]||[],table);
  if(!rows.length){tbody.innerHTML=`<tr class="empty-row"><td colspan="${headers.length}">Belum ada data. Klik + Tambah untuk mulai.</td></tr>`;return;}

  tbody.innerHTML=rows.map(r=>{
    let cells='';
    const dl=getDeadline(table,r);

    if(table==='meetings'){
      cells=`
        <td class="title-cell" title="${r.nama_meeting||''}">${r.nama_meeting||'—'}</td>
        <td style="font-size:12px">${r.tanggal_meeting?new Date(r.tanggal_meeting).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}):'—'}</td>
        <td class="tag-cell" title="${r.peserta||''}" style="font-size:12px;color:var(--text-secondary)">${r.peserta||'—'}</td>
        <td class="notes-cell" title="${r.follow_up||''}">${r.follow_up||'—'}</td>
        <td style="font-size:12px;color:var(--text-secondary)">${r.pic||'—'}</td>
        <td>${deadlineBadge(dl)}</td>
        <td>${statusBadge(r.status)}</td>
        <td class="notes-cell" title="${r.notes||''}">${r.notes||'—'}</td>`;
    } else if(table==='projects'){
      cells=`
        <td class="title-cell" title="${r.nama_project||''}">${r.nama_project||'—'}</td>
        <td style="font-size:12px"><span class="badge b-gray">${r.fase||'—'}</span></td>
        <td class="notes-cell" title="${r.deskripsi||''}">${r.deskripsi||'—'}</td>
        <td style="font-size:12px;color:var(--text-secondary)">${r.responsible||'—'}</td>
        <td style="font-size:12px;color:var(--text-secondary)">${r.accountable||'—'}</td>
        <td class="tag-cell" style="font-size:12px;color:var(--text-secondary)" title="${r.consulted||''}">${r.consulted||'—'}</td>
        <td class="tag-cell" style="font-size:12px;color:var(--text-secondary)" title="${r.informed||''}">${r.informed||'—'}</td>
        <td>${deadlineBadge(dl)}</td>
        <td>${statusBadge(r.status)}</td>
        <td>${prioBadge(r.prioritas)}</td>
        <td class="notes-cell" title="${r.notes||''}">${r.notes||'—'}</td>`;
    } else if(table==='tasks'){
      cells=`
        <td class="title-cell" title="${r.judul||''}">${r.judul||'—'}</td>
        <td class="notes-cell" title="${r.deskripsi||''}">${r.deskripsi||'—'}</td>
        <td style="font-size:12px;color:var(--text-secondary)">${r.pic_internal||'—'}</td>
        <td>${deadlineBadge(dl)}</td>
        <td>${prioBadge(r.prioritas)}</td>
        <td>${statusBadge(r.status)}</td>
        <td class="notes-cell" title="${r.notes||''}">${r.notes||'—'}</td>`;
    } else if(table==='koordinasi'){
      const skMap={'Menunggu respons':'b-amber','Sudah dikonfirmasi':'b-green','Ditolak':'b-red'};
      cells=`
        <td class="title-cell" title="${r.topik||''}">${r.topik||'—'}</td>
        <td style="font-size:12px"><span class="badge b-teal">${r.dept_terkait||'—'}</span></td>
        <td style="font-size:12px;color:var(--text-secondary)">${r.pic_eksternal||'—'}</td>
        <td><span class="badge ${skMap[r.status_koordinasi]||'b-gray'}">${r.status_koordinasi||'—'}</span></td>
        <td>${deadlineBadge(dl)}</td>
        <td class="notes-cell" title="${r.notes||''}">${r.notes||'—'}</td>`;
    } else if(table==='delegasi'){
      cells=`
        <td class="title-cell" title="${r.judul||''}">${r.judul||'—'}</td>
        <td style="font-size:12px;color:var(--text-secondary)">${r.didelegasikan_ke||'—'}</td>
        <td style="font-size:12px"><span class="badge b-pink">${r.dept||'—'}</span></td>
        <td>${deadlineBadge(r.deadline_laporan)}</td>
        <td>${statusBadge(r.status)}</td>
        <td class="notes-cell" title="${r.catatan_followup||''}">${r.catatan_followup||'—'}</td>`;
    }

    return `<tr>${cells}<td><button class="btn-icon" onclick="editRecord('${table}','${r.id}')">&#x270E;</button><button class="btn-icon btn-del" onclick="deleteRecord('${table}','${r.id}')">&#x2715;</button></td></tr>`;
  }).join('');
}

function buildForm(table, data){
  const cols=COLUMNS[table]||[];
  const half=[];const full=[];
  cols.forEach(c=>{
    if(c.type==='textarea') full.push(c);
    else half.push(c);
  });
  const renderField=c=>{
    const val=data?.(c.key)||'';
    let input='';
    if(c.type==='select'){
      input=`<select id="ff-${c.key}">${(c.opts||[]).map(o=>`<option${val===o?' selected':''}>${o}</option>`).join('')}</select>`;
    } else if(c.type==='textarea'){
      input=`<textarea id="ff-${c.key}" placeholder="${c.label}...">${val}</textarea>`;
    } else if(c.type==='date'){
      input=`<input type="date" id="ff-${c.key}" value="${val}">`;
    } else {
      input=`<input type="text" id="ff-${c.key}" placeholder="${c.label}..." value="${val}">`;
    }
    return `<div class="field ${c.type==='textarea'?'full':''}"><label>${c.label}${c.required?' *':''}</label>${input}</div>`;
  };

  return `<div class="form-grid">${cols.map(renderField).join('')}</div>`;
}

function openForm(){
  editId=null;
  editTable=(activeTab==='semua'?'tasks':TABS.find(t=>t.id===activeTab)?.table)||'tasks';
  document.getElementById('modal-title').textContent='Tambah item';
  let formHtml='';
  if(activeTab==='semua'){
    formHtml=`<div class="field full" style="margin-bottom:12px"><label>Kategori *</label><select id="ff-_table" onchange="switchFormTab(this.value)"><option value="tasks">Task</option><option value="meetings">Meeting</option><option value="projects">Project</option><option value="koordinasi">Koordinasi</option><option value="delegasi">Delegasi</option></select></div><div id="form-fields">${buildForm('tasks',null)}</div>`;
  } else {
    formHtml=`<div id="form-fields">${buildForm(editTable,null)}</div>`;
  }
  document.getElementById('form-body').innerHTML=formHtml;
  document.getElementById('overlay').classList.add('open');
}

function switchFormTab(t){
  editTable=t;
  document.getElementById('form-fields').innerHTML=buildForm(t,null);
}

function closeForm(){document.getElementById('overlay').classList.remove('open');editId=null;editTable=null;}

async function saveRecord(){
  if(activeTab==='semua'&&!editId){
    const sel=document.getElementById('ff-_table');
    if(sel) editTable=sel.value;
  }
  const table=editTable||'tasks';
  const cols=COLUMNS[table]||[];
  const payload={};
  for(const c of cols){
    const el=document.getElementById('ff-'+c.key);
    if(el) payload[c.key]=el.value||null;
    if(c.required&&(!el||!el.value.trim())){toast('Lengkapi field wajib!');return;}
  }
  let err;
  if(editId){
    const res=await sb.from(table).update(payload).eq('id',editId);
    err=res.error;
  } else {
    const res=await sb.from(table).insert(payload);
    err=res.error;
  }
  if(err){toast('Gagal simpan: '+err.message);return;}
  toast(editId?'Berhasil diupdate!':'Berhasil ditambahkan!');
  closeForm();
  await loadAll();
}

async function editRecord(table, id){
  const row=(allData[table]||[]).find(r=>r.id===id);
  if(!row){toast('Data tidak ditemukan');return;}
  editId=id;
  editTable=table;
  document.getElementById('modal-title').textContent='Edit item';
  // Show kategori selector if in semua tab
  let formHtml='';
  if(activeTab==='semua'){
    const catVal=table;
    formHtml=`<div class="field full" style="margin-bottom:12px"><label>Kategori *</label><select id="ff-_table" disabled><option value="${catVal}">${{meetings:'Meeting',projects:'Project',tasks:'Task',koordinasi:'Koordinasi',delegasi:'Delegasi'}[catVal]}</option></select></div><div id="form-fields">${buildForm(table,k=>row[k])}</div>`;
  } else {
    formHtml=`<div id="form-fields">${buildForm(table,k=>row[k])}</div>`;
  }
  document.getElementById('form-body').innerHTML=formHtml;
  document.getElementById('overlay').classList.add('open');
}

async function deleteRecord(table, id){
  if(!confirm('Hapus item ini?')) return;
  const {error}=await sb.from(table).delete().eq('id',id);
  if(error){toast('Gagal hapus!');return;}
  toast('Item dihapus.');
  await loadAll();
}

document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeForm();});

loadAll();
</script>
